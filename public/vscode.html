const TERMINAL_HISTORY = [
  { type: 'cmd', text: '➜  next-app git:(main) ✗' },

];

let openTabs = ['page.tsx'];
let activeTab = 'page.tsx';
let sidebarOpen = true;
let aiOpen = false;
let panelOpen = true;
let activePanel = 'terminal';

function renderTree(nodes, container, depth=0) {
  nodes.forEach(node => {
    const el = document.createElement('div');
    if(node.type === 'folder') {
      el.className = `tree-item folder${node.open?' open':''}`;
      el.innerHTML = `<span class="arrow">›</span><span class="icon">${node.open?'📂':'📁'}</span>${node.name}`;
      el.onclick = (e) => {
        e.stopPropagation();
        node.open = !node.open;
        el.classList.toggle('open', node.open);
        el.querySelector('.icon').textContent = node.open ? '📂' : '📁';
        el.querySelector('.arrow').style.transform = node.open ? 'rotate(90deg)' : '';
        childContainer.style.display = node.open ? 'block' : 'none';
      };
      container.appendChild(el);
      const childContainer = document.createElement('div');
      childContainer.className = 'tree-children' + (node.open?' open':'');
      childContainer.style.display = node.open ? 'block' : 'none';
      if(node.children) renderTree(node.children, childContainer, depth+1);
      container.appendChild(childContainer);
    } else {
      el.className = 'tree-item';
      const ext = node.name.split('.').pop();
      const icons = {tsx:'⚛',ts:'⚡',css:'🎨',json:'📦',js:'🟨',md:'📄'};
      el.innerHTML = `<span class="icon">${icons[ext]||'📄'}</span>${node.name}`;
      el.onclick = () => {
        if(node.file) openFile(node.file);
      };
      if(depth > 0) el.style.paddingLeft = (16 + depth * 12) + 'px';
      container.appendChild(el);
    }
  });
}

function openFile(filename) {
  if(!openTabs.includes(filename)) {
    openTabs.push(filename);
  }
  activeTab = filename;
  renderTabs();
  renderEditor();
  document.getElementById('breadcrumb-file').textContent = filename;
  document.querySelectorAll('.tree-item').forEach(el => {
    el.classList.toggle('selected', el.textContent.trim().includes(filename));
  });
}

function closeTab(filename, e) {
  e.stopPropagation();
  const idx = openTabs.indexOf(filename);
  openTabs = openTabs.filter(t => t !== filename);
  if(activeTab === filename) {
    activeTab = openTabs[Math.max(0, idx-1)] || openTabs[0] || null;
  }
  renderTabs();
  if(activeTab) renderEditor();
}

function renderTabs() {
  const bar = document.getElementById('tab-bar');
  bar.innerHTML = '';
  openTabs.forEach(f => {
    const tab = document.createElement('div');
    tab.className = `tab${f === activeTab ? ' active' : ''}`;
    const ext = f.split('.').pop();
    const icons = {tsx:'⚛',ts:'⚡',css:'🎨',json:'📦',js:'🟨',md:'📄'};
    tab.innerHTML = `<span style="font-size:12px">${icons[ext]||'📄'}</span>${f}<span class="tab-close" onclick="closeTab('${f}',event)">✕</span>`;
    tab.onclick = () => { activeTab = f; renderTabs(); renderEditor(); document.getElementById('breadcrumb-file').textContent = f; };
    bar.appendChild(tab);
  });
}

function renderEditor() {
  const file = FILES[activeTab];
  if(!file) {
    document.getElementById('code-content').innerHTML = `<span style="color:var(--ide-text-muted);padding:20px;display:block;">파일을 열 수 없습니다.</span>`;
    document.getElementById('line-numbers').innerHTML = '';
    return;
  }
  const lines = file.lines;
  let lnHtml = '';
  let codeHtml = '';
  lines.forEach((line, i) => {
    lnHtml += `${i+1}\n`;
    codeHtml += `<span id="ln${i+1}">${line||' '}</span>\n`;
  });
  document.getElementById('line-numbers').innerHTML = lnHtml;
  document.getElementById('code-content').innerHTML = codeHtml;
  drawMinimap(lines.length);
}

function drawMinimap(lineCount) {
  const canvas = document.getElementById('minimap-canvas');
  const h = Math.max(lineCount * 2, 160);
  canvas.height = h;
  canvas.style.height = h + 'px';
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, 0, 60, h);
  for(let i = 0; i < lineCount; i++) {
    const y = i * 2;
    const w = Math.random() * 35 + 5;
    const colors = ['#569cd644','#ce917833','#6a995533','#dcdcaa33','#4ec9b033','#d4d4d422'];
    ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
    ctx.fillRect(4, y, w, 1.5);
  }
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.fillRect(0, 0, 60, 30);
}

function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('hidden', !sidebarOpen);
  document.getElementById('act-explorer').classList.toggle('active', sidebarOpen);
}

function setActivity(name) {
  document.querySelectorAll('.activity-icon').forEach(el => el.classList.remove('active'));
}

function toggleAI() {
  aiOpen = !aiOpen;
  document.getElementById('ai-panel').classList.toggle('open', aiOpen);
  document.getElementById('act-ai').classList.toggle('active', aiOpen);
}

function togglePanel() {
  panelOpen = !panelOpen;
  document.getElementById('bottom-panel').classList.toggle('hidden', !panelOpen);
}

function switchPanel(name, el) {
  activePanel = name;
  document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderPanel();
}

function renderPanel() {
  const content = document.getElementById('panel-content');
  if(activePanel === 'terminal') {
    content.innerHTML = TERMINAL_HISTORY.map(l =>
      `<div class="terminal-line ${l.type}">${l.text}</div>`
    ).join('') + `<div class="terminal-prompt">
      <span class="terminal-line cmd" style="flex-shrink:0">➜ <span style="color:#4ec9b0">next-app</span></span>
      <input class="terminal-input" id="term-input" onkeydown="handleTermKey(event)" autofocus>
    </div>`;
  } else if(activePanel === 'problems') {
    content.innerHTML = PROBLEMS.map(l =>
      `<div class="terminal-line ${l.type}">${l.text}</div>`
    ).join('');
  } else {
    content.innerHTML = `<div class="terminal-line out">Next.js 14.2.0 build output</div><div class="terminal-line ok">Compiled successfully</div>`;
  }
}

function handleTermKey(e) {
  if(e.key === 'Enter') {
    const input = document.getElementById('term-input');
    const cmd = input.value.trim();
    if(!cmd) return;
    const responses = {
      'ls': 'src  public  node_modules  package.json  tsconfig.json  next.config.js',
      'pwd': '/workspace/next-app',
      'node -v': 'v20.11.0',
      'npm -v': '10.2.4',
      'git status': 'On branch main\nChanges not staged:\n  modified: src/app/page.tsx',
      'git log --oneline': 'a3f2c1d feat: add auth hook\n9b4e2a8 fix: layout padding\n2c8d1f5 init: next.js project',
      'npm run build': '▲ Next.js 14.2.0\n✓ Compiled successfully\n✓ Linting passed\nRoute (app)  Size\n○ /  5.21 kB\n✓ Build complete',
      'clear': null,
    };
    TERMINAL_HISTORY.push({ type: 'cmd', text: `➜  next-app git:(main) ${cmd}` });
    if(cmd === 'clear') {
      TERMINAL_HISTORY.length = 0;
    } else if(responses[cmd] !== undefined) {
      TERMINAL_HISTORY.push({ type: 'out', text: responses[cmd] });
    } else {
      TERMINAL_HISTORY.push({ type: 'err', text: `zsh: command not found: ${cmd}` });
    }
    renderPanel();
  }
}

async function sendAIMessage() {
  const input = document.getElementById('ai-input');
  const msg = input.value.trim();
  if(!msg) return;
  input.value = '';

  const msgs = document.getElementById('ai-messages');
  const userDiv = document.createElement('div');
  userDiv.className = 'ai-msg user';
  userDiv.textContent = msg;
  msgs.appendChild(userDiv);

  const thinkDiv = document.createElement('div');
  thinkDiv.className = 'ai-msg thinking';
  thinkDiv.textContent = '분석 중...';
  msgs.appendChild(thinkDiv);
  msgs.scrollTop = msgs.scrollHeight;

  const currentFile = FILES[activeTab];
  const codeContext = currentFile ? currentFile.lines.map(l => l.replace(/<[^>]+>/g, '')).join('\n') : '';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `당신은 숙련된 TypeScript/Next.js 개발자 AI 어시스턴트입니다. 현재 사용자가 IDE에서 '${activeTab}' 파일을 보고 있습니다.\n\n현재 파일 내용:\n\`\`\`${currentFile?.lang||'text'}\n${codeContext}\n\`\`\`\n\n코드에 대한 질문에 한국어로 간결하게 답변하세요. 코드 예시는 짧게 유지하세요.`,
        messages: [{ role: 'user', content: msg }]
      })
    });
    const data = await res.json();
    thinkDiv.remove();
    const reply = data.content?.[0]?.text || '응답을 받지 못했습니다.';
    const replyDiv = document.createElement('div');
    replyDiv.className = 'ai-msg assistant';
    replyDiv.textContent = reply;
    msgs.appendChild(replyDiv);
  } catch(e) {
    thinkDiv.textContent = '오류가 발생했습니다. API 연결을 확인하세요.';
  }
  msgs.scrollTop = msgs.scrollHeight;
}

function handleAIKey(e) {
  if(e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendAIMessage();
  }
}

document.getElementById('code-content').addEventListener('click', function(e) {
  const sel = window.getSelection();
  if(sel && sel.rangeCount > 0) {
    const range = sel.getRangeAt(0);
    const lineEl = range.startContainer.parentElement?.closest('[id^="ln"]');
    if(lineEl) {
      const ln = parseInt(lineEl.id.replace('ln',''));
      document.getElementById('sb-cursor').textContent = `Ln ${ln}, Col 1`;
    }
  }
});

renderTree(TREE_STRUCTURE, document.getElementById('file-tree'));
renderTabs();
renderEditor();
renderPanel();
</script>
