apiVersion: apps/v1
kind: Deployment
metadata:
  name: transition-dashboard
  labels:
    app: transition-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: transition-dashboard
  template:
    metadata:
      labels:
        app: transition-dashboard
    spec:
      # GHCR 이미지가 private 이면 아래 imagePullSecrets를 사용
      # imagePullSecrets:
      #   - name: ghcr-pull-secret
      containers:
      - name: dashboard
        image: __IMAGE__
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: transition-dashboard-service
spec:
  type: ClusterIP
  selector:
    app: transition-dashboard
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: transition-dashboard-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-prod   # ClusterIssuer 이름과 동일해야 함
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - dashboard.dev-x.store
    secretName: webserver-tls
  rules:
  - host: dashboard.dev-x.store
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: transition-dashboard-service
            port:
              number: 80
