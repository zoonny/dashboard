apiVersion: apps/v1
kind: Deployment
metadata:
  name: transition-dashboard
  labels:
    app: transition-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: transition-dashboard
  template:
    metadata:
      labels:
        app: transition-dashboard
    spec:
      containers:
      - name: dashboard
        image: ghcr.io/${{ github.repository }}:latest
        ports:
        - containerPort: 3000
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: transition-dashboard-service
spec:
  type: NodePort
  selector:
    app: transition-dashboard
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 30080
