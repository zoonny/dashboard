name: Build image and update deploy repo

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare image tag
        id: meta
        shell: bash
        run: |
          REPO_LOWER=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          echo "image=${REGISTRY}/${REPO_LOWER}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}

    deploy:
      needs: build-and-push
      runs-on: self-hosted

      env:
        IMAGE: ${{ needs.build-and-push.outputs.image }}

      steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Set up kubeconfig
          shell: bash
          run: |
            mkdir -p "${HOME}/.kube"
            printf '%s' "${{ secrets.KUBE_CONFIG }}" > "${HOME}/.kube/config"
            chmod 600 "${HOME}/.kube/config"

        - name: Render manifest
          shell: bash
          run: |
            sed "s|__IMAGE__|${IMAGE}|g" "${MANIFEST_PATH}" > /tmp/rendered-deployment.yaml
            echo "Rendered image:"
            grep -n "image:" /tmp/rendered-deployment.yaml

        - name: Deploy to Kubernetes
          shell: bash
          run: |
            kubectl apply -n "${K8S_NAMESPACE}" -f /tmp/rendered-deployment.yaml
            kubectl rollout status deployment/"${APP_NAME}" -n "${K8S_NAMESPACE}" --timeout=180s
            echo "Deployed image:"
            kubectl get deployment "${APP_NAME}" -n "${K8S_NAMESPACE}" \
              -o jsonpath='{.spec.template.spec.containers[0].image}{"\n"}'

        - name: Debug on failure
          if: failure()
          shell: bash
          run: |
            kubectl get all -n "${K8S_NAMESPACE}"
            kubectl get pods -n "${K8S_NAMESPACE}" -l app="${APP_NAME}" -o wide
            kubectl describe deployment "${APP_NAME}" -n "${K8S_NAMESPACE}"
            kubectl describe pod -n "${K8S_NAMESPACE}" -l app="${APP_NAME}"