name: Build and Deploy to Kubernetes

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  APP_NAME: transition-dashboard
  K8S_NAMESPACE: default
  MANIFEST_PATH: k8s/deployment.yaml

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare image metadata
        id: meta
        shell: bash
        run: |
          REPO_LOWER=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          echo "image=${REGISTRY}/${REPO_LOWER}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest=${REGISTRY}/${REPO_LOWER}:latest" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.image }}

  update-deploy-repo:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout deploy repo
        uses: actions/checkout@v4
        with:
          repository: zoonny/dashboard-deploy
          token: ${{ secrets.DEPLOY_REPO_TOKEN }}
          path: deploy-repo

      - name: Update dev image tag
        shell: bash
        run: |
          cd deploy-repo
          sed -i "s|newTag:.*|newTag: ${GITHUB_SHA}|g" overlays/dev/kustomization.yaml
          git config user.name "zoonny"
          git config user.email "hyungii@naver.com"
          git add overlays/dev/kustomization.yaml
          git commit -m "Update dev image to ${GITHUB_SHA}" || echo "No changes to commit"
          git push